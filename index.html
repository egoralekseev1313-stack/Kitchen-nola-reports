<!DOCTYPE html>
<html lang="ru">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">

<style>
body{
  margin:0;
  background:#0a0a0f;
  font-family:-apple-system;
  color:white;
  display:flex;
  justify-content:center;
}
.app{
  width:100%;
  max-width:420px;
  padding:16px;
}
h2{
  text-align:center;
  margin:20px 0;
}

.card{
  background:#15151d;
  padding:16px;
  border-radius:16px;
  margin-bottom:12px;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:14px;
  background:linear-gradient(135deg,#6d5dfc,#8b7cff);
  color:white;
  font-size:16px;
  margin-top:10px;
}

.hidden{display:none;}

.pin-box{
  display:flex;
  justify-content:center;
  gap:10px;
  margin:20px 0;
}

.pin-cell{
  width:50px;
  height:50px;
  border-radius:12px;
  border:2px solid #333;
  display:flex;
  align-items:center;
  justify-content:center;
}

.pin-dot{
  width:8px;
  height:8px;
  background:white;
  border-radius:50%;
}

.pin-pad{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:16px;
}

.pin-btn{
  width:70px;
  height:70px;
  border-radius:50%;
  background:#1c1c24;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
}
</style>
</head>

<body>
<div class="app">
<div style="display:flex; justify-content:flex-end; margin-bottom:10px;">
  <button onclick="toggleLang()" style="
    background:#1c1c24;
    border:none;
    border-radius:10px;
    padding:6px 10px;
    font-size:12px;
    color:#aaa;
  ">
      🌐
  </button>
</div>
  
<!-- LOGIN -->
<div id="login">
<h2>Кто менеджер</h2>
<div id="managerList"></div>
<button onclick="addNew()">+ Добавить менеджера</button>
</div>

<!-- PIN -->
<div id="pin" class="hidden">
<h2>Введите PIN</h2>
<div class="pin-box">
<div class="pin-cell"></div><div class="pin-cell"></div>
<div class="pin-cell"></div><div class="pin-cell"></div>
</div>
<div class="pin-pad" id="pad"></div>
</div>

<div id="loading" class="hidden">
<h2>⏳ Проверка...</h2>
</div>

<div id="form" class="hidden">
<h2>Отчет</h2>
<button onclick="sendReport()">Отправить тест</button>
</div>

</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbw1nZgGTE24ITeppnLV9jVuY9zlfFzMxVaeP4mG_DGlaGXbIMNim9BSRhC5sllwHF-I/exec";

let state = {
  user: "",
  pin: "",
  isNew: false
};

// 📡 API
async function api(action, data = {}) {
  const res = await fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({ action, ...data })
  });
  return res.json();
}

// 👤 загрузка менеджеров
async function loadManagers(){
  const list = await api("getManagers");
  const container = document.getElementById("managerList");
  container.innerHTML = "";

  list.forEach(name=>{
    const btn = document.createElement("button");
    btn.innerText = name;
    btn.onclick = ()=>selectUser(name,false);
    container.appendChild(btn);
  });
}

// ➕ новый
function addNew(){
  state.isNew = true;
  selectUser("", true);
}

// 👉 выбор
function selectUser(name,newUser){
  state.user = name;
  state.isNew = newUser;
  state.pin = "";
  updatePin();
  show("pin");
}

// 🔐 PIN клавиатура
const pad = document.getElementById("pad");

[1,2,3,4,5,6,7,8,9,"←",0].forEach(n=>{
  const b=document.createElement("div");
  b.className="pin-btn";
  b.innerText=n;

  b.onclick=()=>{
    if(n==="←") state.pin = state.pin.slice(0,-1);
    else if(state.pin.length<4) state.pin += n;

    updatePin();

    if(state.pin.length===4) checkPin();
  };

  pad.appendChild(b);
});

function updatePin(){
  document.querySelectorAll(".pin-cell").forEach((c,i)=>{
    c.innerHTML = i < state.pin.length ? "<div class='pin-dot'></div>" : "";
  });
}

// 🔍 проверка
async function checkPin(){
  show("loading");

  if(state.isNew){
    const name = prompt("Имя на иврите");
    await api("addManager",{ name, pin: state.pin });
    state.user = name;
    show("form");
    return;
  }

  const res = await api("login",{
    name: state.user,
    pin: state.pin
  });

  if(res.success){
    show("form");
  } else {
    alert("Неверный PIN");
    state.pin="";
    updatePin();
    show("pin");
  }
}

// 📄 отправка теста
async function sendReport(){
  await api("submitReport",{
    report:{
      date: new Date().toISOString(),
      manager: state.user,
      data:{ test:true }
    }
  });

  alert("Отправлено");
}

// 🧭 навигация
function show(id){
  ["login","pin","form","loading"].forEach(x=>{
    document.getElementById(x).classList.add("hidden");
  });
  document.getElementById(id).classList.remove("hidden");
}

// 🚀 старт
loadManagers();

let lang = "he";

const t = {
  he: {
    title: "מי המנהל",
    enterPin: "הכנס קוד PIN",
    checking: "בודק...",
    add: "הוסף מנהל",
    wrongPin: "קוד שגוי",
    report: "דוח",
    send: "שלח"
  },
  ru: {
    title: "Кто менеджер",
    enterPin: "Введите PIN",
    checking: "Проверка...",
    add: "Добавить менеджера",
    wrongPin: "Неверный PIN",
    report: "Отчет",
    send: "Отправить"
  }
};

function toggleLang(){
  lang = lang === "he" ? "ru" : "he";
  applyLang();
}
function applyLang(){
  document.body.dir = lang === "he" ? "rtl" : "ltr";

  document.querySelectorAll("[data-t]").forEach(el=>{
    const key = el.dataset.t;
    el.innerText = t[lang][key] || key;
  });
}
</script>

</body>
</html>
